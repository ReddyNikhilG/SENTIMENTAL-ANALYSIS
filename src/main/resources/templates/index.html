<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>

<title>AI Sentiment Dashboard</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="https://cdn.jsdelivr.net/npm/wordcloud@1.2.2/src/wordcloud2.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<style>

body{
font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
background:
radial-gradient(circle at 15% 20%, rgba(99,102,241,0.35), transparent 35%),
radial-gradient(circle at 85% 15%, rgba(34,211,238,0.30), transparent 38%),
radial-gradient(circle at 80% 80%, rgba(236,72,153,0.25), transparent 42%),
linear-gradient(135deg,#050816 0%,#0b1024 55%,#12173a 100%);
color:#f8fafc;
display:flex;
justify-content:center;
align-items:center;
min-height:100vh;
padding:30px 16px;
position:relative;
overflow-x:hidden;
margin:0;
}

body::before,
body::after{
content:"";
position:fixed;
width:420px;
height:420px;
border-radius:50%;
filter:blur(70px);
z-index:-1;
pointer-events:none;
}

body::before{
top:-120px;
left:-120px;
background:rgba(56,189,248,0.28);
}

body::after{
bottom:-140px;
right:-110px;
background:rgba(129,140,248,0.30);
}

.container{
background:rgba(15,23,42,0.72);
border:1px solid rgba(148,163,184,0.18);
backdrop-filter:blur(12px);
-webkit-backdrop-filter:blur(12px);
padding:40px;
border-radius:18px;
width:750px;
max-width:100%;
box-shadow:0 30px 70px rgba(2,6,23,0.6);
}

h1{
text-align:center;
margin-bottom:20px;
}

textarea{
width:100%;
height:120px;
border-radius:10px;
border:1px solid rgba(148,163,184,0.35);
background:rgba(15,23,42,0.55);
color:#e2e8f0;
padding:12px;
font-size:16px;
}

textarea:focus{
outline:none;
border-color:#38bdf8;
box-shadow:0 0 0 3px rgba(56,189,248,0.25);
}

button{
margin-top:15px;
padding:12px 25px;
border:none;
border-radius:999px;
background:linear-gradient(90deg,#0ea5e9,#6366f1);
color:white;
font-size:16px;
cursor:pointer;
transition:0.3s;
}

button:hover{
transform:translateY(-1px) scale(1.03);
box-shadow:0 10px 25px rgba(14,165,233,0.4);
}

.result{
margin-top:20px;
font-size:22px;
text-align:center;
}

.meter{
height:20px;
background:rgba(30,41,59,0.7);
border-radius:10px;
overflow:hidden;
margin-top:10px;
}

.meter-fill{
height:100%;
background:linear-gradient(90deg,#ef4444,#facc15,#22c55e);
width:0%;
transition:1s;
}

.history{
margin-top:20px;
}

table{
width:100%;
margin-top:10px;
border-collapse:collapse;
}

td,th{
border-bottom:1px solid rgba(148,163,184,0.22);
padding:8px;
}

canvas{
margin-top:20px;
}

.live{
color:#60a5fa;
margin-top:10px;
text-align:center;
}

@media (max-width: 768px){
	.container{
		padding:24px;
		border-radius:14px;
	}

	h1{
		font-size:1.5rem;
	}

	#wordcloud{
		width:100%;
		height:180px;
	}
}

</style>

</head>

<body>

<div class="container">

<h1>AI Sentiment Analyzer</h1>

<form method="post" action="/analyze">

<textarea id="textInput"
name="text"
placeholder="Enter text here..."
onkeyup="liveAnalyze()"></textarea>

<p id="liveSentiment" class="live"></p>

<br>

<button>Analyze Sentiment</button>

</form>

<p th:if="${error}" th:text="${error}" style="color:#fca5a5; margin-top:12px; text-align:center;"></p>

<div class="result">

<p th:text="${emoji}"></p>
<p th:text="${sentiment}"></p>

</div>

<div class="meter">
<div class="meter-fill" id="meter"></div>
</div>

<canvas id="chart"></canvas>

<canvas id="wordcloud" width="600" height="200"></canvas>

<br>

<button onclick="downloadReport()">Download Report</button>

<div class="history">

<h3>Sentiment History</h3>

<table>

<tr>
<th>Text</th>
<th>Sentiment</th>
</tr>

<tr th:each="item : ${history}">
<td th:text="${item.text}"></td>
<td th:text="${item.sentiment}"></td>
</tr>

</table>

</div>

</div>

<script th:inline="javascript">

var score = /*[[${score}]]*/ 0;

if(score != null){

document.getElementById("meter").style.width = (score*20)+"%";

var ctx = document.getElementById("chart");

new Chart(ctx,{
type:'bar',
data:{
labels:['Sentiment Score'],
datasets:[{
label:'Score',
data:[score],
backgroundColor:'#3b82f6'
}]
}
});

}

</script>

<script>

function liveAnalyze(){

var text = document.getElementById("textInput").value;

if(text.length < 3) return;

fetch("/live?text=" + encodeURIComponent(text))
.then(res => res.json())
.then(data => {

document.getElementById("liveSentiment").innerText =
"Live Sentiment: " + data.sentiment;

});

}

</script>

<script>

var words = [
["happy",20],
["good",15],
["excellent",10],
["bad",12],
["sad",8],
["love",18],
["hate",9]
];

WordCloud(document.getElementById("wordcloud"),{
list: words
});

</script>

<script>

function downloadReport(){

const { jsPDF } = window.jspdf;

var doc = new jsPDF();

var text = document.getElementById("textInput").value;
var sentiment = document.querySelector(".result").innerText;

doc.text("Sentiment Analysis Report",20,20);
doc.text("Text:",20,40);
doc.text(text,20,50);
doc.text("Sentiment Result:",20,80);
doc.text(sentiment,20,90);

doc.save("sentiment-report.pdf");

}

</script>

</body>
</html>
